{{define "content"}}
<div class="graph-page">

  <div class="graph-shell">
    <div class="graph-toolbar">
      <div class="graph-toolbar-inner">
        
        <label class="styled-switch">
          <span>显示孤立节点</span>
          <input type="checkbox" id="graph-orphan-toggle" checked>
          <div class="switch-track">
            <div class="switch-indicator"></div>
          </div>
        </label>
        
        <div class="graph-actions-horizontal" data-notes-tools>
          <button class="notes-action-button" type="button" aria-label="搜索" aria-expanded="false" aria-controls="graph-local-search-panel" data-tooltip="搜索" id="graph-search-btn">
            <span class="material-symbol" aria-hidden="true">search</span>
          </button>
          
          <button class="notes-action-button" type="button" aria-label="标签" aria-expanded="false" data-tooltip="显示标签" id="graph-tags-btn">
            <span class="material-symbol" aria-hidden="true">sell</span>
          </button>
          
          {{template "theme_toggle_action" .}}
          
          <button id="graph-reset" class="notes-action-button" type="button" aria-label="重置视图" data-tooltip="重置视图">
            <span class="material-symbol" aria-hidden="true">center_focus_strong</span>
          </button>

          <div class="notes-tool-panel notes-search-panel" id="graph-local-search-panel" aria-hidden="true">
            <input class="notes-search-input" type="search" id="graph-search-input" placeholder="搜索文章标题..." autocomplete="off" spellcheck="false" aria-label="搜索文章标题...">
          </div>
        </div>
      </div>
    </div>
    
    <div id="graph-container"></div>
  </div>
</div>
{{end}}
