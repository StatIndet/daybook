{{define "content"}}
<section class="home-hero" aria-label="{{T .Lang "home.hero_label"}}">
  <div class="hero-avatar-wrap">
    <img class="hero-avatar" src="/images/avatar/shelby.jpg" alt="史帙头像">
  </div>

  <div class="hero-content">
    <div class="hero-identity">
      <h1 class="hero-name">
        <span class="hero-name-cn">史帙</span>
        <span class="hero-name-en">Daybook</span>
      </h1>

      <p class="hero-slogan">{{T .Lang "home.slogan"}}</p>
    </div>

    {{template "social_links" .}}
  </div>
</section>

{{template "home_footer" .}}
{{end}}
