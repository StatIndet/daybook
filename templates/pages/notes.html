{{define "content"}}
<div class="notes-page">
  <section class="notes-list article-stage" aria-label="文章列表">
    {{if .MonthGroups}}
      {{range .MonthGroups}}
        <div class="notes-month">
          <div class="notes-month-list">
            {{range .Notes}}
              {{template "note_card" .}}
            {{end}}
          </div>
        </div>
      {{end}}
      {{else}}
      <p class="notes-empty">还没有发布的文章。</p>
    {{end}}
    <p class="notes-empty notes-filter-empty" hidden>没有找到匹配的文章。</p>
  </section>

  {{template "notes_aside" .}}
</div>
{{end}}
