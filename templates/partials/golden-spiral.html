{{define "golden_spiral"}}
<div class="golden-spiral"
  data-outer-rect="{{.Spiral.OuterRect}}"
  data-outer-left-top="{{.Spiral.OuterRectLeftTop}}"
  data-outer-right-bottom="{{.Spiral.OuterRectRightBottom}}"
  data-spiral-outer-corner="{{.Spiral.SpiralOuterCorner}}"
  data-spiral-start="{{.Spiral.SpiralVisualStart}}"
  data-spiral-end="{{.Spiral.SpiralVisualEnd}}"
  data-spin-center="{{.Spiral.SpinCenterX}} {{.Spiral.SpinCenterY}}"
  data-spiral-quarters="{{.Spiral.SpiralOuterQuarterTurns}}..{{.Spiral.SpiralInnerQuarterTurns}}"
  aria-hidden="true">
  <style>
    @keyframes golden-curve-life {
      0%,
      {{.Spiral.CurveStartPct}}% {
        opacity: 0;
        stroke-dashoffset: var(--golden-curve-dash-length);
      }

      {{.Spiral.CurveFadePct}}% {
        opacity: 1;
        stroke-dashoffset: var(--golden-curve-dash-length);
        animation-timing-function: cubic-bezier(0.618, 0, 1, 1);
      }

      {{.Spiral.CurveGrowEndPct}}%,
      {{.Spiral.CurveShrinkStartPct}}% {
        opacity: 1;
        stroke-dashoffset: 0;
        animation-timing-function: cubic-bezier(0, 0, 0.382, 1);
      }

      {{.Spiral.CurveShrinkEndPct}}% {
        opacity: 1;
        stroke-dashoffset: var(--golden-curve-dash-length);
      }

      {{.Spiral.CurveHidePct}}%,
      100% {
        opacity: 0;
        stroke-dashoffset: var(--golden-curve-dash-length);
      }
    }

    {{range .Spiral.Diagonals}}
    @keyframes golden-guide-life-{{.Order}} {
      0%,
      {{.GrowStartPct}}% {
        opacity: 0;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }

      {{.GrowFadePct}}% {
        opacity: 1;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }

      {{.GrowEndPct}}%,
      {{.ShrinkStartPct}}% {
        opacity: 1;
        stroke-dasharray: 1 1;
        stroke-dashoffset: 0;
      }

      {{.ShrinkEndPct}}% {
        opacity: 1;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }

      {{.HidePct}}%,
      100% {
        opacity: 0;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }
    }
    {{end}}

    {{range .Spiral.Squares}}
    @keyframes golden-guide-life-{{.Order}} {
      0%,
      {{.GrowStartPct}}% {
        opacity: 0;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }

      {{.GrowFadePct}}% {
        opacity: 1;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }

      {{.GrowEndPct}}%,
      {{.ShrinkStartPct}}% {
        opacity: 1;
        stroke-dasharray: 1 1;
        stroke-dashoffset: 0;
      }

      {{.ShrinkEndPct}}% {
        opacity: 1;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }

      {{.HidePct}}%,
      100% {
        opacity: 0;
        stroke-dasharray: 0 1;
        stroke-dashoffset: 0;
      }
    }
    {{end}}
  </style>

  <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g class="golden-spiral-pan">
      <g class="golden-spiral-stage" style="--golden-loop-duration: {{.Spiral.LoopDuration}}; transform-origin: {{.Spiral.SpinCenterX}}px {{.Spiral.SpinCenterY}}px;">
        {{range $layer := .Spiral.Layers}}
        <g class="golden-spiral-layer golden-spiral-layer-{{$layer.Index}}" style="{{$layer.Transform}}">
          {{range $.Spiral.Diagonals}}
          <path class="golden-diagonal" d="{{.D}}" pathLength="1" style="animation-name: golden-guide-life-{{.Order}}; stroke-width: {{$layer.DiagonalStrokeWidth}}; --golden-grow-delay: {{.GrowDelay}}; --golden-shrink-delay: {{.ShrinkDelay}}"></path>
          {{end}}
          {{range $.Spiral.Squares}}
          <path class="golden-rect" d="{{.D}}" pathLength="1" style="animation-name: golden-guide-life-{{.Order}}; stroke-width: {{$layer.RectStrokeWidth}}; --golden-grow-delay: {{.GrowDelay}}; --golden-shrink-delay: {{.ShrinkDelay}}"></path>
          {{end}}
          <path class="golden-curve" d="{{$.Spiral.SpiralPath}}" pathLength="4096" style="stroke-width: {{$layer.CurveStrokeWidth}};"></path>
        </g>
        {{end}}
      </g>
    </g>
  </svg>

</div>
{{end}}
