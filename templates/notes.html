{{define "content"}}
<div class="notes-page">
  <section class="notes-list" aria-label="文章列表">
    {{if .Notes}}
      {{range .Notes}}
        <article class="notes-item">
          <div class="notes-item-header">
            <h1 class="notes-item-title">
              <a href="{{.URL}}">{{.Title}}</a>
            </h1>
            <p class="notes-item-meta">
              <time datetime="{{.Date}}">{{.Date}}</time>
              <span>{{.ReadingTime}}</span>
            </p>
          </div>
          {{with .Summary}}<p class="notes-item-summary">{{.}}</p>{{end}}
        </article>
      {{end}}
    {{else}}
      <p class="notes-empty">还没有发布的文章。</p>
    {{end}}
  </section>

  <aside class="notes-aside" aria-label="站点信息">
    <div class="notes-brand notes-aside-identity">
      <h1 class="notes-brand-name">
        <span class="notes-brand-cn">史帙</span>
        <span class="notes-brand-en">Stat.Indet</span>
      </h1>
      <p>笑一个吧，功成名就不是目的。</p>
    </div>

    <div class="notes-footer">
      <div class="notes-footer-actions" aria-label="页面操作">
        <button class="notes-action-button" type="button" aria-label="搜索" data-tooltip="搜索">
          <span class="material-symbol" aria-hidden="true">search</span>
        </button>
        <button class="notes-action-button" type="button" aria-label="标签" data-tooltip="标签">
          <span class="material-symbol" aria-hidden="true">sell</span>
        </button>
        <button class="notes-action-button theme-toggle" type="button" aria-label="切换亮暗模式" data-tooltip="切换亮暗模式">
          <span class="material-symbol" aria-hidden="true">dark_mode</span>
        </button>
      </div>

      <nav class="notes-footer-links" aria-label="页脚链接">
        <div class="footer-link-row">
          <a href="/rss.xml">RSS</a>
          <span class="footer-separator" aria-hidden="true">/</span>
          <a href="#">Github</a>
          <span class="footer-separator" aria-hidden="true">/</span>
          <a href="#">email</a>
        </div>
        <div class="footer-link-row">
          <a href="#">bilibili</a>
          <span class="footer-separator" aria-hidden="true">/</span>
          <a href="#">QQ</a>
          <span class="footer-separator" aria-hidden="true">/</span>
          <a href="#">Wechat</a>
        </div>
      </nav>
      <p>© 2026 史帙</p>
    </div>
  </aside>
</div>
{{end}}
