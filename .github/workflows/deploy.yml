name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daybook-pages-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          DAYBOOK_SITE_NAME: ${{ secrets.DAYBOOK_SITE_NAME }}
          DAYBOOK_SITE_URL: ${{ secrets.DAYBOOK_SITE_URL }}
          DAYBOOK_WALINE_ENABLED: ${{ secrets.DAYBOOK_WALINE_ENABLED }}
          DAYBOOK_WALINE_SERVER_URL: ${{ secrets.DAYBOOK_WALINE_SERVER_URL }}
          DAYBOOK_R2_BASE_URL: ${{ secrets.DAYBOOK_R2_BASE_URL }}
          DAYBOOK_NETEASE_ENABLED: ${{ secrets.DAYBOOK_NETEASE_ENABLED }}
          DAYBOOK_NETEASE_API_BASE_URL: ${{ secrets.DAYBOOK_NETEASE_API_BASE_URL }}
          DAYBOOK_STATS_ENABLED: ${{ secrets.DAYBOOK_STATS_ENABLED }}
          DAYBOOK_STATS_API_BASE: ${{ secrets.DAYBOOK_STATS_API_BASE }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@latest pages deploy public --project-name daybook --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
